name: CD

on:
  workflow_dispatch:
  workflow_run:
    workflows: ['CI']
    branches: [main]
    types: [completed]

permissions:
  contents: read

jobs:
  package:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install deps
        run: npm install --legacy-peer-deps

      - name: Build
        run: |
          npm exec nx -- run @org/api:build
          npm exec nx -- run @org/api:prune
          npm exec nx -- run @org/web:build

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          tar -czf artifacts/api.tar.gz -C apps/TOM-api dist package.json
          tar -czf artifacts/web.tar.gz -C apps/TOM-web .next public package.json next.config.js

      - uses: actions/upload-artifact@v4
        with:
          name: api
          path: artifacts/api.tar.gz

      - uses: actions/upload-artifact@v4
        with:
          name: web
          path: artifacts/web.tar.gz
