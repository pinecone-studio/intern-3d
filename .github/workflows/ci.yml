name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Check Nx sync
        run: npm exec nx -- sync:check

      - name: Lint all projects
        run: npm exec nx -- run-many -t lint --all --parallel=3 -- --max-warnings=0

      - name: Build all projects
        run: npm exec nx -- run-many -t build --all --parallel=3

      - name: Typecheck all projects
        run: npm exec nx -- run-many -t typecheck --all --parallel=3
