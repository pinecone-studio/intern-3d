name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, reopened, synchronize, labeled, unlabeled, ready_for_review]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 20 # 🔥 24 биш → stable
          cache: npm

      - run: npm ci

      - name: Validate team scope
        run: node scripts/validate-team-scope.mjs

      - name: Resolve CI scope
        id: ci_scope
        run: node scripts/resolve-ci-scope.mjs

      - name: Check Nx sync
        run: npm exec nx -- sync:check

      - name: Lint & Build (scoped)
        if: ${{ github.event_name == 'pull_request' && steps.ci_scope.outputs.projects != '' }}
        run: npm exec nx -- run-many -t lint build --projects="${{ steps.ci_scope.outputs.projects }}" --parallel=3

      - name: Lint & Build (all)
        if: ${{ github.event_name != 'pull_request' || steps.ci_scope.outputs.projects == '' }}
        run: npm exec nx -- run-many -t lint build --all --parallel=3

      - name: Typecheck API
        if: ${{ github.event_name != 'pull_request' || steps.ci_scope.outputs.team == 'TOM' || steps.ci_scope.outputs.team == '' }}
        run: npm exec nx -- run @org/api:typecheck
