name: CI

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - labeled
      - unlabeled
      - ready_for_review

permissions:
  contents: read

jobs:
  validate:
    name: Validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Validate team scope
        run: node scripts/validate-team-scope.mjs

      - run: npm ci

      - name: Check Nx sync
        run: npm exec nx -- sync:check

      - name: Lint and build all projects
        run: npm exec nx -- run-many -t lint build --all --parallel=3

      - name: Typecheck API
        run: npm exec nx -- run @org/api:typecheck
